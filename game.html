<!DOCTYPE html>
<html>
<head>
<title>Tiles Match Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&display=swap" rel="stylesheet">
<style>
  #board {
    width: 700px;
    height: 750px;
    margin: 100px auto 0 auto;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(6, 1fr);
    background-image: url("Woodtexture.jpg");
  }
  .cell {
    position: relative;
    perspective: 600px;
  }
  .tile {
    position: absolute;
    top: 6px;
    left: 6px;
    width: calc(100% - 12px);
    height: calc(100% - 12px);
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.4s;
  }
  .tile.flipped {
    transform: rotateY(180deg);
  }
  .face {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 8px;
    overflow: hidden;
    backface-visibility: hidden;
  }
  .back {
    background-color: lightgrey;
  }
  .front {
    transform: rotateY(180deg);
  }
  .front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  #counter {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-family: 'Fredoka', sans-serif;
    font-size: 40px;
    color: #10281A;
    background-color: #F6F1E3;
    padding: 14px 30px;
    border-radius: 20px;
    box-shadow: 0 5px 0 rgba(0, 0, 0, 0.25);
  }
  #pauseBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 64px;
    height: 64px;
    background-color: #F6F1E3;
    border-radius: 16px;
    box-shadow: 0 5px 0 rgba(0, 0, 0, 0.25);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #pauseBtn svg {
    width: 34px;
    height: 34px;
  }
  #pauseMenu {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #pauseMenu.open {
    display: flex;
  }
  .menu-box {
    background-color: #F6F1E3;
    padding: 40px;
    border-radius: 28px;
    display: flex;
    gap: 26px;
    box-shadow: 0 8px 0 rgba(0, 0, 0, 0.25);
  }
  .icon-btn {
    width: 96px;
    height: 96px;
    background-color: #FFC94D;
    border: none;
    border-radius: 20px;
    box-shadow: 0 5px 0 #C99527;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn svg {
    width: 46px;
    height: 46px;
  }
</style>
</head>
<body style="background-color: #1E5B34;">

<div id="pauseBtn" onclick="openPause()">
  <svg viewBox="0 0 24 24" fill="#10281A">
    <rect x="6" y="5" width="4" height="14" rx="1"/>
    <rect x="14" y="5" width="4" height="14" rx="1"/>
  </svg>
</div>

<div id="pauseMenu">
  <div class="menu-box">
    <button class="icon-btn" onclick="resetGame()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#10281A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
        <polyline points="21 3 21 9 15 9"/>
      </svg>
    </button>
    <button class="icon-btn" onclick="closePause()">
      <svg viewBox="0 0 24 24" fill="#10281A">
        <polygon points="6 4 20 12 6 20"/>
      </svg>
    </button>
    <button class="icon-btn" onclick="goMenu()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#10281A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 11l9-8 9 8"/>
        <path d="M5 10v10h14V10"/>
      </svg>
    </button>
  </div>
</div>

<div id="board"></div>

<div id="counter">Guesses: 0</div>

<script>
var images = [];
for (var i = 1; i <= 18; i++) {
  images.push("Image/image" + i + ".png");
  images.push("Image/image" + i + ".png");
}

for (var i = images.length - 1; i > 0; i--) {
  var j = Math.floor(Math.random() * (i + 1));
  var temp = images[i];
  images[i] = images[j];
  images[j] = temp;
}

var board = document.getElementById("board");
var tiles = [];

for (var i = 0; i < 36; i++) {
  var cell = document.createElement("div");
  cell.className = "cell";

  var tile = document.createElement("div");
  tile.className = "tile";
  tile.setAttribute("data-index", i);
  tile.setAttribute("data-image", images[i]);

  var back = document.createElement("div");
  back.className = "face back";

  var front = document.createElement("div");
  front.className = "face front";
  var img = document.createElement("img");
  img.src = images[i];
  front.appendChild(img);

  tile.appendChild(back);
  tile.appendChild(front);
  tile.onclick = tileClicked;

  cell.appendChild(tile);
  tiles.push(tile);
  board.appendChild(cell);
}

var flipped = [];
var matched = 0;
var guesses = 0;

function tileClicked(e) {
  var tile = e.currentTarget;
  var idx = parseInt(tile.getAttribute("data-index"));

  if (tile.classList.contains("matched")) return;
  if (flipped.indexOf(idx) !== -1) return;

  if (flipped.length === 2) {
    tiles[flipped[0]].classList.remove("flipped");
    tiles[flipped[1]].classList.remove("flipped");
    flipped = [];
  }

  tile.classList.add("flipped");
  flipped.push(idx);

  if (flipped.length === 2) {
    guesses++;
    document.getElementById("counter").innerHTML = "Guesses: " + guesses;

    var a = tiles[flipped[0]];
    var b = tiles[flipped[1]];

    if (a.getAttribute("data-image") === b.getAttribute("data-image")) {
      a.classList.add("matched");
      b.classList.add("matched");
      a.style.opacity = 0.5;
      b.style.opacity = 0.5;
      matched++;
      flipped = [];

      if (matched === 18) {
        for (var k = 0; k < tiles.length; k++) {
          tiles[k].style.opacity = 0;
        }
      }
    }
  }
}

function openPause() {
  document.getElementById("pauseMenu").classList.add("open");
}

function closePause() {
  document.getElementById("pauseMenu").classList.remove("open");
}

function resetGame() {
  location.reload();
}

function goMenu() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
